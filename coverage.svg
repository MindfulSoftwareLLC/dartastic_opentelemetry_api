<svg xmlns="http://www.w3.org/2000/svg" width="118" height="20" role="img" aria-label="coverage: 100%">
  <title>coverage: 100%</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r"><rect width="118" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="72" height="20" fill="#555"/>
    <rect x="72" width="46" height="20" fill="#4c1"/>
    <rect width="118" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="110" text-rendering="geometricPrecision">
    <text x="360" y="150" transform="scale(.1)" fill="#010101" fill-opacity=".3">coverage</text>
    <text x="360" y="140" transform="scale(.1)">coverage</text>
    <text x="950" y="150" transform="scale(.1)" fill="#010101" fill-opacity=".3">100%</text>
    <text x="950" y="140" transform="scale(.1)">100%</text>
  </g>
</svg>
